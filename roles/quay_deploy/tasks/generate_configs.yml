---

# Generate Quay and Clair configuration files from templates

- name: "Generate Quay config.yaml"
  ansible.builtin.template:
    src: "config.yaml.j2"
    dest: "{{ quay_config_dir }}/config.yaml"
    mode: "0600"

- name: "Generate Clair config.yaml"
  ansible.builtin.template:
    src: "clair-config.yaml.j2"
    dest: "{{ quay_clair_config_dir }}/config.yaml"
    mode: "0600"

- name: "Generate Quay environment file"
  ansible.builtin.template:
    src: "quay.env.j2"
    dest: "{{ quay_quadlet_dir }}/quay.env"
    mode: "0600"
